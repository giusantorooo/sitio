<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archivo — G. Santoro</title>
  <meta name="description" content="Giuseppe Santoro. Cerámica y joyería en Barcelona. Modelos, moldes, series cortas, escultura, decoración, acabado.">
  <link rel="stylesheet" href="/css/estilo.css">
</head>
<body data-pagina="archivo">
